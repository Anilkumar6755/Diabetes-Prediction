<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <div class="container text-center">
        <h1 class="mb-4">Diabetes Prediction</h1>
        <form action="/predict" method="POST">
            <div class="mb-3">
                <input type="number" name="Pregnancies" class="form-control" placeholder="Pregnancies" required>
            </div>
            <div class="mb-3">
                <input type="number" name="Glucose" class="form-control" placeholder="Glucose" required>
            </div>
            <div class="mb-3">
                <input type="number" name="Bloodpressure" class="form-control" placeholder="Blood Pressure" required>
            </div>
            <div class="mb-3">
                <input type="number" name="BMI" step="any" class="form-control" placeholder="BMI" required>
            </div>
            <div class="mb-3">
                <input type="number" name="Age" class="form-control" placeholder="Age" required>
            </div>
            <button type="submit" class="btn btn-success">Predict</button>
        </form>

        {% if prediction %}
        <div class="alert alert-info mt-4">
            <h4>{{ prediction }}</h4>
        </div>
        {% endif %}
    </div>

</body>
</html>
